<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin login — Bliss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="admin-page">

    <header class="admin-topbar">
        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='images/bliss-logo (BLISS).png') }}" alt="Bliss">
            <img class="logo-sub" src="{{ url_for('static', filename='images/bliss-logo (LOUNGE BAR).png') }}" alt="">
        </a>
        <div>
            <a href="/">Back to site</a>
        </div>
    </header>

    <section class="admin-login">
        <h1>Admin login</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required autocomplete="username">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit">Sign in</button>
        </form>
    </section>

</body>

</html>
